### Welcome to Jekyll Webpack Boilerplate
#
# CẤU HÌNH TRANG WEB THÔNG TIN CHUNG CỦA ỨNG DỤNG
# (Các nhóm hãy sửa thông tin trong phần này thành của nhóm mình)

title: "ORBIT - Smart Habit Scheduler" # THAY BẰNG TÊN ỨNG DỤNG CỦA NHÓM BẠN
email: "contact@hcmut.edu.vn" # Thay bằng email liên hệ của nhóm
description: "Trang showcase đồ án môn Mobile App" # Mô tả cực kỳ ngắn gọn
baseurl: "/project-showcase-mobile-template" # QUAN TRỌNG: Thay bằng đúng Tên Repository của nhóm bạn (nhớ giữ dấu / ở đầu)
url: "https://l02-bang6chia3.github.io" # QUAN TRỌNG: Thay bằng link tài khoản GitHub Pages của bạn (VD: https://username.github.io)
theme_color: '#efeeff'

# =========================================================
# THÔNG TIN TÁC GIẢ / NHÓM
# =========================================================
author: "Tên Nhóm / Tên các thành viên" # Thay bằng tên nhóm của bạn
github_username: "l02-bang6chia3" # Thay bằng username GitHub của người chứa repo này
twitter_username: ""
logo: assets/images/large-logo.png

social:
  name: "Thông tin liên hệ nhóm"
  links:
    - https://github.com/l02-bang6chia3/project-showcase-mobile-template # Dán link repo đồ án của nhóm vào đây

languages: ["vi", "en"]
ampdir: amp

# Dán link GitHub Repo của nhóm bạn vào đây để hiện nút "View on GitHub"
github: https://github.com/l02-bang6chia3/project-showcase-mobile-template

# =========================================================
# CÁC CẤU HÌNH HỆ THỐNG MẶC ĐỊNH (KHÔNG CẦN SỬA ĐOẠN DƯỚI NÀY)
# =========================================================

### Google webmaster tools, Google Analytics, Doorbell and Cookie consent uncomment and put the API key
#webmaster_verifications:
#  google: verification_code
#google_analytics: UA-XXXXXXXXX-X
#doorbell:
#  id: doorbell_id
#  appKey: doorbell_appKey

#cookie_consent: true

### Build settings
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - octopress-minify-html
  - amp-jekyll

### Exclude from processing.
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - _src
  - _images
  - LICENSE
  - package.json
  - README.md
  - webpack.config.js
  - yarn-error.log
  - yarn.lock
  - config
  - optimization-fix
  - optimization-fix-this-file-is-ignored.js
  - icon.png
  - docs
